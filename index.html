<!DOCTYPE html>
<html lang="es">
<head>
<link rel="icon" href="https://fav.farm/📌" type="image/png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gantt — Estudio Lucci</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f5f5f5;--bg3:#ebebeb;
  --text:#111;--text2:#555;--text3:#999;
  --b:rgba(0,0,0,0.11);--b2:rgba(0,0,0,0.20);
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1a1a;--bg2:#232323;--bg3:#2d2d2d;
  --text:#f0f0f0;--text2:#aaa;--text3:#666;
  --b:rgba(255,255,255,0.09);--b2:rgba(255,255,255,0.18);
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);padding:18px;min-height:100vh;}
h1{font-size:15px;font-weight:500;color:var(--text2);margin-bottom:13px;}
h1 span{color:var(--text3);font-weight:400;font-size:13px;}
.tb{display:flex;gap:6px;margin-bottom:9px;flex-wrap:wrap;align-items:center;}
select,input[type=date],input[type=text],input[type=number],textarea{
  font-size:12px;font-family:inherit;background:var(--bg);color:var(--text);
  border:0.5px solid var(--b2);border-radius:var(--r);padding:4px 8px;outline:none;
}
select,input[type=date],input[type=text],input[type=number]{height:29px;}
select:focus,input:focus,textarea:focus{border-color:#1D9E75;}
button{font-size:12px;font-family:inherit;background:none;color:var(--text);border:0.5px solid var(--b2);border-radius:var(--r);padding:4px 10px;height:29px;cursor:pointer;white-space:nowrap;}
button:hover{background:var(--bg2);}
button.pri{background:#1D9E75;color:#fff;border-color:#1D9E75;}
button.pri:hover{background:#17876a;}
button.dan{color:#D85A30;border-color:#D85A30;}
button.dan:hover{background:rgba(216,90,48,.08);}
button.sm{font-size:10px;padding:1px 6px;height:20px;border-radius:4px;}
.ztog{display:flex;border:0.5px solid var(--b2);border-radius:var(--r);overflow:hidden;}
.ztog button{border:none;border-right:0.5px solid var(--b2);border-radius:0;padding:4px 9px;height:29px;color:var(--text2);}
.ztog button:last-child{border-right:none;}
.ztog button.active{background:var(--bg2);color:var(--text);font-weight:500;}
.sep{font-size:11px;color:var(--text3);}

/* form */
.fa{background:var(--bg2);border:0.5px solid var(--b2);border-radius:var(--rl);padding:13px 15px;margin-bottom:11px;display:none;}
.fa.open{display:block;}
.fat{font-size:13px;font-weight:500;margin-bottom:11px;}
.fag{display:grid;gap:8px;align-items:end;}
.fag.c{grid-template-columns:1fr auto;}
.fag.p{grid-template-columns:1fr auto;}
.fag.t{grid-template-columns:2fr 1fr 1fr 1fr auto;}
@media(max-width:680px){.fag.c,.fag.p,.fag.t{grid-template-columns:1fr;}}
.fl{font-size:11px;color:var(--text2);display:block;margin-bottom:3px;}
.fag input{width:100%;}
.fbt{display:flex;gap:6px;padding-top:15px;}
#ep{margin-top:6px;font-size:11px;color:var(--text2);min-height:14px;}

/* color picker */
.cp-wrap{display:flex;flex-direction:column;gap:5px;}
.cp-swatches{display:flex;gap:5px;flex-wrap:wrap;}
.cp-sw{width:22px;height:22px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0;}
.cp-sw:hover{transform:scale(1.15);}
.cp-sw.sel{border-color:var(--text);transform:scale(1.1);}

/* legend */
.leg{display:flex;gap:13px;margin-bottom:9px;font-size:11px;color:var(--text2);flex-wrap:wrap;align-items:center;}
.leg span{display:flex;align-items:center;gap:4px;}
.dot{width:9px;height:9px;border-radius:2px;display:inline-block;flex-shrink:0;}

/* gantt */
.gm{display:flex;border:0.5px solid var(--b2);border-radius:var(--rl);overflow:hidden;transition:height .2s;}
.gl{width:294px;min-width:294px;overflow-y:auto;overflow-x:hidden;border-right:0.5px solid var(--b2);}
.gl::-webkit-scrollbar{display:none;}
.gr{flex:1;overflow:auto;}
.gr::-webkit-scrollbar{height:4px;width:4px;}
.gr::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
#lhdr{display:flex;align-items:center;padding:0 8px 0 10px;font-size:11px;font-weight:500;color:var(--text2);background:var(--bg2);position:sticky;top:0;z-index:6;border-bottom:0.5px solid var(--b2);justify-content:space-between;flex-shrink:0;}

/* rows */
.row-c{height:32px;display:flex;align-items:center;padding:0 5px 0 8px;gap:5px;background:var(--bg2);border-bottom:0.5px solid var(--b2);cursor:pointer;user-select:none;}
.row-c:hover{background:var(--bg3);}
.row-c.sel{border-left:3px solid #1D9E75;padding-left:5px;}
.row-p{height:30px;display:flex;align-items:center;padding:0 5px 0 20px;gap:4px;background:var(--bg);border-bottom:0.5px solid var(--b);cursor:pointer;user-select:none;overflow:hidden;transition:height .13s,opacity .13s;}
.row-p:hover{background:var(--bg2);}
.row-p.sel{border-left:2px solid #1D9E75;padding-left:18px;}
.row-p.hidden{height:0;opacity:0;pointer-events:none;border:none;}
.row-p.dragging{opacity:0.4;}
.row-t{height:33px;display:flex;align-items:center;padding:0 7px 0 32px;gap:4px;background:var(--bg);border-bottom:0.5px solid var(--b);cursor:pointer;overflow:hidden;transition:height .13s,opacity .13s;}
.row-t:hover{background:var(--bg2);}
.row-t.hidden{height:0;opacity:0;pointer-events:none;border:none;}
.row-t.dragging{opacity:0.4;}

/* drag handle */
.dh{font-size:11px;color:var(--text3);cursor:grab;flex-shrink:0;padding:0 2px;opacity:0;transition:opacity .15s;}
.row-p:hover .dh,.row-t:hover .dh{opacity:1;}
.dh:active{cursor:grabbing;}

/* drop zone */


/* right rows */
.rrow-c{height:32px;background:var(--bg2);border-bottom:0.5px solid var(--b2);position:relative;}
.rrow-p{height:30px;border-bottom:0.5px solid var(--b);position:relative;overflow:hidden;transition:height .13s;}
.rrow-p.hidden{height:0;border:none;}
.rrow-t{height:33px;border-bottom:0.5px solid var(--b);position:relative;overflow:hidden;transition:height .13s;}
.rrow-t.hidden{height:0;border:none;}


#rhdr{position:sticky;top:0;z-index:5;background:var(--bg2);}
#mhdr{height:22px;position:relative;overflow:hidden;border-bottom:0.5px solid var(--b2);}
#shdr{height:0;position:relative;overflow:hidden;border-bottom:0.5px solid var(--b);transition:height .12s;}

.ci{font-size:9px;color:var(--text3);flex-shrink:0;transition:transform .15s;width:11px;text-align:center;display:inline-block;}
.ci.o{transform:rotate(0deg);}
.ci.c{transform:rotate(-90deg);}
.pbar{width:28px;height:3px;border-radius:2px;background:var(--b);overflow:hidden;flex-shrink:0;}
.pbar-f{height:100%;border-radius:2px;}

/* obs panel */
#obs{display:none;border:0.5px solid var(--b2);border-top:none;border-radius:0 0 var(--rl) var(--rl);background:var(--bg2);overflow:hidden;}
#obs.open{display:flex;}
.obs-sb{width:294px;min-width:294px;padding:11px 11px 11px 13px;border-right:0.5px solid var(--b2);display:flex;flex-direction:column;gap:3px;}
.obs-main{flex:1;padding:11px 13px;display:flex;flex-direction:column;gap:7px;}
#obs-ta{width:100%;resize:vertical;min-height:80px;max-height:180px;font-size:12px;line-height:1.6;border-radius:var(--r);background:var(--bg);color:var(--text);border:0.5px solid var(--b2);padding:7px 9px;}
.obs-ft{display:flex;align-items:center;gap:7px;}
.obs-ok{font-size:11px;color:#1D9E75;opacity:0;transition:opacity .4s;}
.obs-ok.show{opacity:1;}
.empty{padding:44px 14px;text-align:center;font-size:13px;color:var(--text2);line-height:1.9;}
</style>
</head>
<body>

<h1>Gantt <span>— Estudio Lucci &amp; Asociados</span></h1>

<div class="tb">
  <button class="pri" onclick="openCF(null)">+ Cliente</button>
  <span class="sep">|</span>
  <span class="sep">Período:</span>
  <input type="date" id="from-d" value="2026-01-01" onchange="onRange()">
  <span class="sep">→</span>
  <input type="date" id="to-d" value="2026-12-31" onchange="onRange()">
  <div class="ztog">
    <button id="z-dias" onclick="setZ('dias')">Días</button>
    <button id="z-semanas" onclick="setZ('semanas')" class="active">Semanas</button>
    <button id="z-meses" onclick="setZ('meses')">Meses</button>
  </div>
  <button onclick="goToday()">↗ Hoy</button>
</div>

<div class="fa" id="fa">
  <div class="fat" id="fa-t"></div>
  <div class="fag" id="fa-g"></div>
  <div id="ep"></div>
</div>

<div class="leg">
  <span><span class="dot" style="background:#1D9E75"></span>En curso</span>
  <span><span class="dot" style="background:#EF9F27"></span>Atrasado</span>
  <span><span class="dot" style="background:#D85A30"></span>Crítico/Vencido</span>
  <span><span class="dot" style="background:#639922"></span>Completo</span>
  <span><span style="display:inline-block;width:2px;height:11px;background:#E24B4A;border-radius:1px;"></span>&nbsp;Hoy</span>
  <span style="color:var(--text3);">⠿ arrastrar · ▾ colapsar · click proyecto = observaciones</span>
</div>

<div class="gm" id="gm" style="height:500px;">
  <div class="gl" id="lp">
    <div id="lhdr" style="height:22px;"><span>Cliente / Proyecto / Tarea</span><span>Prog.</span></div>
    <div id="lr" style="position:relative;"></div>
  </div>
  <div class="gr" id="rp">
    <div id="rhdr"><div id="mhdr"></div><div id="shdr"></div></div>
    <div id="rr" style="position:relative;"></div>
  </div>
</div>

<div id="obs">
  <div class="obs-sb">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:1px;">
      <span id="obs-dot" style="width:8px;height:8px;border-radius:50%;background:#1D9E75;flex-shrink:0;display:inline-block;"></span>
      <span style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" id="obs-pn"></span>
    </div>
    <span style="font-size:11px;color:var(--text2);" id="obs-pc"></span>
    <div style="margin-top:9px;font-size:10px;color:var(--text3);margin-bottom:1px;">Última actualización</div>
    <div style="font-size:10px;color:var(--text2);" id="obs-last">—</div>
    <div style="margin-top:6px;font-size:10px;color:var(--text3);">Ctrl+Enter para guardar</div>
  </div>
  <div class="obs-main">
    <div style="font-size:11px;font-weight:500;color:var(--text2);">Observaciones del proyecto</div>
    <textarea id="obs-ta" placeholder="Último avance, próximos pasos, bloqueos..."></textarea>
    <div class="obs-ft">
      <button class="pri" onclick="saveObs()" style="height:27px;">Guardar</button>
      <button onclick="closeObs()" style="height:27px;">Cerrar</button>
      <span class="obs-ok" id="obs-ok">✓ Guardado</span>
    </div>
  </div>
</div>

<script>
const MN=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const COLORS=['#1D9E75','#378ADD','#BA7517','#993556','#3B6D11','#533AB7','#993C1D','#185FA5','#BA1757','#5D6D7E'];
const DWM={dias:20,semanas:5,meses:1.5};
const KEY='lucci-g5';

let D={clients:[]},FC={},ZOOM='semanas';
let CC_={},CP_={},SEL=null;

// ── Drag state ─────────────────────────────────────────────
let DRAG={active:false,type:null,cid:null,pid:null,tid:null};

const uid=()=>Math.random().toString(36).slice(2,9);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const gFrom=()=>new Date(document.getElementById('from-d').value+'T00:00:00');
const gTo=()=>new Date(document.getElementById('to-d').value+'T00:00:00');
const gDW=()=>DWM[ZOOM];
const dOff=d=>Math.round((d-gFrom())/86400000);

function endDate(t){const d=new Date(t.startDate+'T00:00:00');d.setDate(d.getDate()+t.duration-1);return d;}
function fmtD(d){return`${d.getDate()}/${d.getMonth()+1}`;}
function fmtDT(iso){if(!iso)return'—';const d=new Date(iso);return d.toLocaleDateString('es-AR',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}

function stColor(t){
  if(t.progress>=100)return'#639922';
  const now=new Date(),end=endDate(t),start=new Date(t.startDate+'T00:00:00');
  if(now>end)return'#D85A30';
  if(now<start)return'#1D9E75';
  const exp=Math.min(99,((now-start)/86400000/t.duration)*100);
  return t.progress>=exp-15?'#1D9E75':t.progress>=exp-30?'#EF9F27':'#D85A30';
}

function clientColor(cl){
  const tasks=(cl.projects||[]).flatMap(p=>p.tasks||[]);
  if(!tasks.length)return'#999';
  const c=tasks.map(stColor);
  if(c.includes('#D85A30'))return'#D85A30';
  if(c.includes('#EF9F27'))return'#EF9F27';
  if(c.every(x=>x==='#639922'))return'#639922';
  return'#1D9E75';
}

function projProgress(p){
  const tasks=p.tasks||[];
  if(!tasks.length)return 0;
  return Math.round(tasks.reduce((s,t)=>s+t.progress,0)/tasks.length);
}

function taskBar(t){
  const DW=gDW(),from=gFrom(),to=gTo();
  const ts=new Date(t.startDate+'T00:00:00'),te=endDate(t);
  if(te<from||ts>to)return null;
  const so=dOff(ts),eo=dOff(te),rng=Math.round((to-from)/86400000);
  const x=Math.max(0,so)*DW;
  return{x,w:Math.max((Math.min(eo,rng)+1)*DW-x,4)};
}

function clientSpanBar(cl){
  const tasks=(cl.projects||[]).flatMap(p=>p.tasks||[]);
  if(!tasks.length)return null;
  const from=gFrom(),to=gTo(),DW=gDW();
  const starts=tasks.map(t=>new Date(t.startDate+'T00:00:00'));
  const ends=tasks.map(t=>endDate(t));
  const s=new Date(Math.min(...starts)),e=new Date(Math.max(...ends));
  if(e<from||s>to)return null;
  const rng=Math.round((to-from)/86400000);
  const x=Math.max(0,dOff(s))*DW;
  return{x,w:Math.max((Math.min(dOff(e),rng)+1)*DW-x,4)};
}

// ── Storage ──────────────────────────────────────────────────
function sv(){
  try{localStorage.setItem(KEY,JSON.stringify({d:D,z:ZOOM,cc:CC_,cp:CP_,f:document.getElementById('from-d').value,t:document.getElementById('to-d').value}));}
  catch(e){}
}
function ld(){
  try{
    const raw=localStorage.getItem(KEY);if(!raw)return;
    const s=JSON.parse(raw);
    D=s.d||{clients:[]};
    if(s.z)ZOOM=s.z;
    if(s.cc)CC_=s.cc;
    if(s.cp)CP_=s.cp;
    if(s.f)document.getElementById('from-d').value=s.f;
    if(s.t)document.getElementById('to-d').value=s.t;
    ['dias','semanas','meses'].forEach(k=>document.getElementById('z-'+k).classList.toggle('active',k===ZOOM));
  }catch(e){}
}

// ── Controls ─────────────────────────────────────────────────
function setZ(z){ZOOM=z;['dias','semanas','meses'].forEach(k=>document.getElementById('z-'+k).classList.toggle('active',k===z));document.getElementById('rp')._s=false;render();goToday();}
function onRange(){document.getElementById('rp')._s=false;render();}
function goToday(){const rp=document.getElementById('rp'),now=new Date(),from=gFrom(),to=gTo();if(now<from||now>to)return;rp.scrollLeft=Math.max(0,dOff(now)*gDW()-170);}
function toggleCC(cid,e){e.stopPropagation();CC_[cid]=!CC_[cid];sv();render();}
function toggleCP(pid,e){e.stopPropagation();CP_[pid]=!CP_[pid];sv();render();}

// ── Obs ──────────────────────────────────────────────────────
function selectProj(pid){
  if(SEL===pid){closeObs();return;}
  SEL=pid;
  const{cl,p}=findProj(pid);if(!p)return;
  document.getElementById('obs-pn').textContent=p.name||'';
  document.getElementById('obs-pc').textContent=cl?'Cliente: '+cl.name:'';
  document.getElementById('obs-dot').style.background=p.color||cl?.color||'#1D9E75';
  document.getElementById('obs-ta').value=p.obs||'';
  document.getElementById('obs-last').textContent=fmtDT(p.obsDate);
  document.getElementById('obs-ok').classList.remove('show');
  document.getElementById('obs').classList.add('open');
  document.getElementById('gm').style.height='350px';
  render();
  setTimeout(()=>document.getElementById('obs-ta').focus(),80);
}
function closeObs(){SEL=null;document.getElementById('obs').classList.remove('open');document.getElementById('gm').style.height='500px';render();}
function saveObs(){
  if(!SEL)return;const{p}=findProj(SEL);if(!p)return;
  p.obs=document.getElementById('obs-ta').value;p.obsDate=new Date().toISOString();
  document.getElementById('obs-last').textContent=fmtDT(p.obsDate);sv();
  const ok=document.getElementById('obs-ok');ok.classList.add('show');setTimeout(()=>ok.classList.remove('show'),2000);
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)&&SEL)saveObs();});

function findProj(pid){
  for(const cl of D.clients||[]){
    const p=(cl.projects||[]).find(x=>x.id===pid);
    if(p)return{cl,p};
  }
  return{};
}

// ── Color picker ─────────────────────────────────────────────
let PICKED_COLOR=COLORS[0];

function renderColorPicker(selectedColor){
  PICKED_COLOR=selectedColor||COLORS[0];
  return`<div class="cp-wrap">
    <label class="fl">Color</label>
    <div class="cp-swatches" id="cp-sw">
      ${COLORS.map(c=>`<div class="cp-sw${c===PICKED_COLOR?' sel':''}" style="background:${c};" onclick="pickColor('${c}')"></div>`).join('')}
    </div>
  </div>`;
}

function pickColor(c){
  PICKED_COLOR=c;
  document.querySelectorAll('.cp-sw').forEach(el=>{
    el.classList.toggle('sel',el.style.background===c||rgbToHex(el.style.background)===c);
  });
}

function rgbToHex(rgb){
  const m=rgb.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  if(!m)return rgb;
  return'#'+[m[1],m[2],m[3]].map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');
}

// ── Drag & Drop ───────────────────────────────────────────────
// Usamos dragover sobre las filas existentes — sin zonas invisibles
// Una línea indicadora se dibuja encima/debajo según posición Y del cursor

let INDICATOR=null;

function getIndicator(){
  if(!INDICATOR||!INDICATOR.isConnected){
    INDICATOR=document.createElement('div');
    INDICATOR.style.cssText='position:absolute;left:0;right:0;height:3px;background:#1D9E75;border-radius:2px;pointer-events:none;z-index:99;display:none;';
    document.getElementById('lr').appendChild(INDICATOR);
  }
  return INDICATOR;
}

function hideIndicator(){
  const ind=getIndicator();ind.style.display='none';
  DRAG.insertBefore=null;DRAG.insertCid=null;DRAG.insertPid=null;
}

function onDragStart(e,type,cid,pid,tid){
  DRAG={active:true,type,cid,pid,tid,insertBefore:null,insertCid:null,insertPid:null};
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>e.target.classList.add('dragging'),0);
}

function onDragEnd(e){
  e.target.classList.remove('dragging');

  // Capturar estado de destino ANTES de que hideIndicator lo limpie
  const dropType=DRAG.type, dropCid=DRAG.insertCid, dropPid=DRAG.insertPid;
  const dropBefore=DRAG.insertBefore, dragPid=DRAG.pid, dragTid=DRAG.tid;
  const wasActive=DRAG.active;

  hideIndicator();

  if(!wasActive){DRAG={active:false};return;}

  if(dropType==='proj'&&dropCid){
    const cl=(D.clients||[]).find(x=>x.id===dropCid);if(!cl){DRAG={active:false};return;}
    const fromIdx=cl.projects.findIndex(p=>p.id===dragPid);if(fromIdx===-1){DRAG={active:false};return;}
    const proj=cl.projects.splice(fromIdx,1)[0];
    let toIdx=dropBefore?cl.projects.findIndex(p=>p.id===dropBefore):-1;
    if(toIdx===-1)toIdx=cl.projects.length;
    cl.projects.splice(toIdx,0,proj);
    sv();render();
  }

  if(dropType==='task'&&dropPid){
    const{p}=findProj(dropPid);if(!p){DRAG={active:false};return;}
    const fromIdx=p.tasks.findIndex(t=>t.id===dragTid);if(fromIdx===-1){DRAG={active:false};return;}
    const task=p.tasks.splice(fromIdx,1)[0];
    let toIdx=dropBefore?p.tasks.findIndex(t=>t.id===dropBefore):-1;
    if(toIdx===-1)toIdx=p.tasks.length;
    p.tasks.splice(toIdx,0,task);
    sv();render();
  }

  DRAG={active:false};
}

function onRowDragOver(e,type,cid,pid,tid){
  if(!DRAG.active||DRAG.type!==type)return;
  // No soltar sobre sí mismo
  if(type==='proj'&&tid===DRAG.pid)return;
  if(type==='task'&&tid===DRAG.tid)return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';

  const rect=e.currentTarget.getBoundingClientRect();
  const mid=rect.top+rect.height/2;
  const above=e.clientY<mid;

  // Mostrar indicador
  const lpRect=document.getElementById('lr').getBoundingClientRect();
  const ind=getIndicator();
  ind.style.display='block';
  ind.style.top=(rect.top - lpRect.top + (above?0:rect.height)-1)+'px';

  if(type==='proj'){
    DRAG.insertCid=cid;
    DRAG.insertBefore=above?tid:null;
    // Si es debajo, insertBefore = próximo proyecto
    if(!above){
      const cl=(D.clients||[]).find(x=>x.id===cid);
      if(cl){
        const idx=cl.projects.findIndex(p=>p.id===tid);
        DRAG.insertBefore=idx<cl.projects.length-1?cl.projects[idx+1].id:null;
      }
    }
  }
  if(type==='task'){
    DRAG.insertPid=pid;
    DRAG.insertBefore=above?tid:null;
    if(!above){
      const{p}=findProj(pid);
      if(p){
        const idx=p.tasks.findIndex(t=>t.id===tid);
        DRAG.insertBefore=idx<p.tasks.length-1?p.tasks[idx+1].id:null;
      }
    }
  }
}

function onRowDragLeave(e){
  // Solo ocultar si salimos del panel izquierdo completo
  if(!document.getElementById('lr').contains(e.relatedTarget)){
    hideIndicator();
  }
}

// ── Render ────────────────────────────────────────────────────
function render(){
  const DW=gDW(),from=gFrom(),to=gTo();
  if(to<=from)return;
  const rdays=Math.round((to-from)/86400000)+1,TW=rdays*DW;
  const isDias=ZOOM==='dias',hdrH=isDias?46:22;
  const clients=D.clients||[];
  document.getElementById('lhdr').style.height=hdrH+'px';

  let lh='',rh='',totalH=0;

  if(!clients.length){
    lh='<div class="empty">Sin clientes aún.<br>Usá <strong>+ Cliente</strong> para empezar.</div>';
  } else {
    clients.forEach(cl=>{
      const cCol=clientColor(cl),cC=!!CC_[cl.id];
      const projs=cl.projects||[];
      const totalT=projs.reduce((s,p)=>s+(p.tasks||[]).length,0);
      const avgP=projs.length?Math.round(projs.reduce((s,p)=>s+projProgress(p),0)/projs.length):0;
      const csb=clientSpanBar(cl);

      lh+=`<div class="row-c" onclick="toggleCC('${cl.id}',event)">
        <span class="ci ${cC?'c':'o'}">▾</span>
        <span style="width:9px;height:9px;border-radius:50%;background:${cCol};display:inline-block;flex-shrink:0;"></span>
        <span style="flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(cl.name)}</span>
        <span style="font-size:10px;color:var(--text3);flex-shrink:0;white-space:nowrap;">${projs.length}p·${totalT}t·${avgP}%</span>
        <button class="sm" onclick="event.stopPropagation();openCF('${cl.id}')" title="Editar cliente">✏</button>
        <button class="sm" onclick="event.stopPropagation();openPF('${cl.id}',null)" title="Nuevo proyecto">+</button>
      </div>`;

      rh+=`<div class="rrow-c">
        ${csb?`<div style="position:absolute;left:${csb.x}px;width:${csb.w}px;top:10px;height:12px;border-radius:3px;background:${cCol}18;border:0.5px solid ${cCol}55;pointer-events:none;"></div>`:''}
      </div>`;
      totalH+=32;

      projs.forEach((p,pi)=>{
        const pC=!!CP_[p.id],isSel=SEL===p.id,prog=projProgress(p);
        const pCol=p.color||cl.color||COLORS[0];
        const hasObs=p.obs&&p.obs.trim().length>0;
        const tasks=p.tasks||[];
        const hidden=cC;



        lh+=`<div class="row-p${hidden?' hidden':''}${isSel?' sel':''}"
          draggable="true"
          ondragstart="onDragStart(event,'proj','${cl.id}','${p.id}',null)"
          ondragend="onDragEnd(event)"
          ondragover="onRowDragOver(event,'proj','${cl.id}','${p.id}','${p.id}')"
          ondragleave="onRowDragLeave(event)"
          onclick="selectProj('${p.id}')">
          <span class="dh" onclick="event.stopPropagation()">⠿</span>
          <span class="ci ${pC?'c':'o'}" onclick="toggleCP('${p.id}',event)">▾</span>
          <span style="width:7px;height:7px;border-radius:50%;background:${pCol};display:inline-block;flex-shrink:0;"></span>
          <span style="flex:1;font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.name)}</span>
          ${hasObs?`<span style="font-size:8px;color:#1D9E75;flex-shrink:0;">●</span>`:''}
          <div class="pbar"><div class="pbar-f" style="width:${prog}%;background:${pCol};"></div></div>
          <span style="font-size:10px;color:var(--text3);min-width:22px;text-align:right;">${prog}%</span>
          <button class="sm" onclick="event.stopPropagation();openPF('${cl.id}','${p.id}')" title="Editar proyecto">✏</button>
          <button class="sm" onclick="event.stopPropagation();openTF('${p.id}',null)" title="Nueva tarea">+</button>
        </div>`;

        // Project right row
        const allBars=tasks.map(t=>taskBar(t)).filter(Boolean);
        let projRBar='';
        if(allBars.length&&!hidden){
          const minX=Math.min(...allBars.map(b=>b.x)),maxX=Math.max(...allBars.map(b=>b.x+b.w));
          projRBar=`<div style="position:absolute;left:${minX}px;width:${maxX-minX}px;top:8px;height:14px;border-radius:3px;background:${pCol}18;border:0.5px solid ${pCol}44;pointer-events:none;">
            <div style="width:${prog}%;height:100%;background:${pCol};opacity:0.35;border-radius:2px 0 0 2px;"></div>
          </div>`;
        }
        rh+=`<div class="rrow-p${hidden?' hidden':''}">${projRBar}</div>`;
        if(!hidden)totalH+=30;

        tasks.forEach((t,ti)=>{
          const bar=taskBar(t),sc=stColor(t),tp=Math.round(t.progress);
          const thidden=hidden||pC;
          const tdzId=`dz-t-${p.id}-${ti}`;
          const trdzId=`rdz-t-${p.id}-${ti}`;



          lh+=`<div class="row-t${thidden?' hidden':''}"
            draggable="true"
            ondragstart="onDragStart(event,'task',null,'${p.id}','${t.id}')"
            ondragend="onDragEnd(event)"
            ondragover="onRowDragOver(event,'task','${cl.id}','${p.id}','${t.id}')"
            ondragleave="onRowDragLeave(event)"
            onclick="openTF('${p.id}','${t.id}')">
            <span class="dh" onclick="event.stopPropagation()">⠿</span>
            <div style="flex:1;min-width:0;">
              <div style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(t.name)}</div>
              <div style="font-size:9px;color:var(--text2);">${fmtD(new Date(t.startDate+'T00:00:00'))} → ${fmtD(endDate(t))} · ${t.duration}d</div>
            </div>
            <div style="display:flex;align-items:center;gap:3px;flex-shrink:0;">
              <div class="pbar"><div class="pbar-f" style="width:${tp}%;background:${sc};"></div></div>
              <span style="font-size:9px;font-weight:500;color:${sc};min-width:22px;">${tp}%</span>
            </div>
          </div>`;

          rh+=`<div class="rrow-t${thidden?' hidden':''}">`;
          if(bar&&!thidden){
            const sl=bar.w>50;
            rh+=`<div onclick="openTF('${p.id}','${t.id}')" title="${esc(t.name)} · ${tp}%"
              style="position:absolute;left:${bar.x}px;width:${bar.w}px;top:7px;height:19px;
              border-radius:4px;background:${sc}28;border:0.5px solid ${sc}88;overflow:hidden;cursor:pointer;z-index:1;">
              <div style="width:${tp}%;height:100%;background:${sc};opacity:0.6;border-radius:3px 0 0 3px;"></div>
              ${sl?`<span style="position:absolute;left:5px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:500;color:${sc};white-space:nowrap;max-width:${bar.w-10}px;overflow:hidden;text-overflow:ellipsis;">${esc(t.name)}</span>`:''}
            </div>`;
          }
          rh+=`</div>`;
          if(!thidden)totalH+=33;
        });


      });


    });
  }

  document.getElementById('lr').innerHTML=lh;

  // Month header
  const mhdr=document.getElementById('mhdr');mhdr.style.width=TW+'px';
  let mh='';let dm=new Date(from.getFullYear(),from.getMonth(),1);
  while(dm<=to){
    const ms=new Date(Math.max(dm,from)),me=new Date(Math.min(new Date(dm.getFullYear(),dm.getMonth()+1,0),to));
    const x=Math.max(0,dOff(ms))*DW,ex=(dOff(me)+1)*DW;
    mh+=`<div style="position:absolute;left:${x}px;width:${ex-x}px;height:100%;display:flex;align-items:center;padding-left:5px;font-size:10px;font-weight:500;color:var(--text2);border-right:0.5px solid var(--b);overflow:hidden;white-space:nowrap;">${MN[dm.getMonth()]}${dm.getFullYear()!==2026?' '+dm.getFullYear():''}</div>`;
    dm=new Date(dm.getFullYear(),dm.getMonth()+1,1);
  }
  mhdr.innerHTML=mh;

  const shdr=document.getElementById('shdr');
  if(isDias){
    shdr.style.height='24px';shdr.style.width=TW+'px';
    let sh='';let dd=new Date(from);
    while(dd<=to){
      const off=dOff(dd),dow=dd.getDay(),isWE=dow===0||dow===6,isMon=dow===1;
      sh+=`<div style="position:absolute;left:${off*DW}px;width:${DW}px;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text${isWE?'3':'2'});border-right:0.5px solid var(--b);${isMon?'font-weight:600;color:var(--text);':''}${isWE?'background:rgba(0,0,0,0.025);':''}overflow:hidden;">${dd.getDate()}</div>`;
      dd=new Date(dd.getFullYear(),dd.getMonth(),dd.getDate()+1);
    }
    shdr.innerHTML=sh;
  } else {shdr.style.height='0';shdr.innerHTML='';}

  const now=new Date(),todOff=dOff(now);
  const todLine=todOff>=0&&todOff<rdays?`<div style="position:absolute;left:${todOff*DW+1}px;top:0;bottom:0;width:2px;background:#E24B4A;opacity:0.45;z-index:3;pointer-events:none;border-radius:1px;"></div>`:'';
  let stripes='';let ds=new Date(from.getFullYear(),from.getMonth(),1);let mi=0;
  while(ds<=to){
    if(mi%2===1){const mss=new Date(Math.max(ds,from)),mse=new Date(Math.min(new Date(ds.getFullYear(),ds.getMonth()+1,0),to));const sx=Math.max(0,dOff(mss))*DW,ex=(dOff(mse)+1)*DW;stripes+=`<div style="position:absolute;left:${sx}px;width:${ex-sx}px;top:0;bottom:0;background:rgba(0,0,0,0.012);pointer-events:none;"></div>`;}
    ds=new Date(ds.getFullYear(),ds.getMonth()+1,1);mi++;
  }
  let wk='';
  if(isDias){let dw2=new Date(from);while(dw2<=to){const dow=dw2.getDay();if(dow===0||dow===6){const wx=dOff(dw2)*DW;wk+=`<div style="position:absolute;left:${wx}px;width:${DW}px;top:0;bottom:0;background:rgba(0,0,0,0.022);pointer-events:none;"></div>`;}dw2=new Date(dw2.getFullYear(),dw2.getMonth(),dw2.getDate()+1);}}

  const rrEl=document.getElementById('rr');
  rrEl.style.width=TW+'px';rrEl.style.minHeight=totalH+'px';
  rrEl.innerHTML=stripes+wk+todLine+rh;

  const rp=document.getElementById('rp');
  if(!rp._s&&todOff>=0&&todOff<rdays){rp.scrollLeft=Math.max(0,todOff*DW-170);rp._s=true;}
}

// ── FORMS ────────────────────────────────────────────────────
function openCF(cid){
  FC={cid};
  const cl=cid?(D.clients||[]).find(x=>x.id===cid):null;
  document.getElementById('fa-t').textContent=cl?'Editar cliente':'Nuevo cliente';
  document.getElementById('fa-g').className='fag c';
  document.getElementById('fa-g').innerHTML=`
    <div><label class="fl">Nombre del cliente</label><input id="fc-n" type="text" value="${esc(cl?.name||'')}" placeholder="Ej: García SRL"></div>
    <div class="fbt">
      <button class="pri" onclick="saveCl()">Guardar</button>
      ${cl?`<button class="dan" onclick="delCl('${cid}')">Eliminar</button>`:''}
      <button onclick="closeF()">Cancelar</button>
    </div>`;
  document.getElementById('ep').textContent='';
  document.getElementById('fa').classList.add('open');
  document.getElementById('fc-n').focus();
}

function openPF(cid,pid){
  FC={cid,pid};
  const cl=(D.clients||[]).find(x=>x.id===cid);
  const p=pid?(cl?.projects||[]).find(x=>x.id===pid):null;
  const currentColor=p?.color||cl?.color||COLORS[0];
  PICKED_COLOR=currentColor;

  document.getElementById('fa-t').innerHTML=`${p?'Editar proyecto':'Nuevo proyecto'} <span style="font-weight:400;color:var(--text2);">— ${esc(cl?.name||'')}</span>`;
  document.getElementById('fa-g').className='fag p';
  document.getElementById('fa-g').innerHTML=`
    <div><label class="fl">Nombre del proyecto</label><input id="fp-n" type="text" value="${esc(p?.name||'')}" placeholder="Ej: Cierre anual 2026"></div>
    ${renderColorPicker(currentColor)}
    <div class="fbt" style="padding-top:0;">
      <button class="pri" onclick="savePrj()">Guardar</button>
      ${p?`<button class="dan" onclick="delPrj('${cid}','${pid}')">Eliminar</button>`:''}
      <button onclick="closeF()">Cancelar</button>
    </div>`;
  document.getElementById('ep').textContent='';
  document.getElementById('fa').classList.add('open');
  document.getElementById('fp-n').focus();
}

function openTF(pid,tid){
  FC={pid,tid};
  const{cl,p}=findProj(pid);
  const t=tid?(p?.tasks||[]).find(x=>x.id===tid):null;
  let defStart=new Date().toISOString().slice(0,10);
  if(!tid&&p?.tasks?.length){
    const latest=p.tasks.reduce((mx,tk)=>{const e=endDate(tk).toISOString().slice(0,10);return e>mx?e:mx;},'');
    if(latest){const nd=new Date(latest+'T00:00:00');nd.setDate(nd.getDate()+1);defStart=nd.toISOString().slice(0,10);}
  }
  document.getElementById('fa-t').innerHTML=`${t?'Editar tarea':'Nueva tarea'} <span style="font-weight:400;color:var(--text2);">— ${esc(p?.name||'')}${cl?' ('+esc(cl.name)+')':''}</span>`;
  document.getElementById('fa-g').className='fag t';
  document.getElementById('fa-g').innerHTML=`
    <div><label class="fl">Nombre</label><input id="ft-n" type="text" value="${esc(t?.name||'')}" placeholder="Ej: Recopilación documentación"></div>
    <div><label class="fl">Inicio</label><input id="ft-s" type="date" value="${t?.startDate||defStart}" oninput="upPv()"></div>
    <div><label class="fl">Días</label><input id="ft-d" type="number" min="1" max="730" value="${t?.duration||7}" oninput="upPv()"></div>
    <div><label class="fl">Progreso %</label><input id="ft-p" type="number" min="0" max="100" value="${t?.progress||0}"></div>
    <div class="fbt">
      <button class="pri" onclick="saveTsk()">Guardar</button>
      ${t?`<button class="dan" onclick="delTsk('${pid}','${tid}')">Eliminar</button>`:''}
      <button onclick="closeF()">Cancelar</button>
    </div>`;
  document.getElementById('fa').classList.add('open');
  upPv();document.getElementById('ft-n').focus();
}

function upPv(){
  const s=document.getElementById('ft-s')?.value,dur=parseInt(document.getElementById('ft-d')?.value)||0;
  const ep=document.getElementById('ep');if(!s||!dur){if(ep)ep.textContent='';return;}
  const d=new Date(s+'T00:00:00');d.setDate(d.getDate()+dur-1);
  if(ep)ep.textContent=`Finaliza: ${d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}`;
}

function closeF(){document.getElementById('fa').classList.remove('open');FC={};}

function saveCl(){
  const name=document.getElementById('fc-n').value.trim();if(!name)return;
  if(!D.clients)D.clients=[];
  if(FC.cid){const cl=D.clients.find(x=>x.id===FC.cid);if(cl)cl.name=name;}
  else D.clients.push({id:uid(),name,color:COLORS[D.clients.length%COLORS.length],projects:[]});
  sv();closeF();render();
}
function delCl(cid){
  if(!confirm('¿Eliminar este cliente y todos sus proyectos?'))return;
  D.clients=D.clients.filter(c=>c.id!==cid);
  sv();closeF();render();
}
function savePrj(){
  const name=document.getElementById('fp-n').value.trim();if(!name)return;
  const color=PICKED_COLOR;
  const cl=(D.clients||[]).find(x=>x.id===FC.cid);if(!cl)return;
  if(!cl.projects)cl.projects=[];
  if(FC.pid){const p=cl.projects.find(x=>x.id===FC.pid);if(p){p.name=name;p.color=color;}}
  else cl.projects.push({id:uid(),name,color,tasks:[]});
  sv();closeF();render();
}
function delPrj(cid,pid){
  if(!confirm('¿Eliminar este proyecto y todas sus tareas?'))return;
  const cl=(D.clients||[]).find(x=>x.id===cid);if(!cl)return;
  cl.projects=cl.projects.filter(p=>p.id!==pid);
  if(SEL===pid)closeObs();
  sv();closeF();render();
}
function saveTsk(){
  const name=document.getElementById('ft-n').value.trim(),startDate=document.getElementById('ft-s').value;
  const duration=Math.max(1,parseInt(document.getElementById('ft-d').value)||1);
  const progress=Math.min(100,Math.max(0,parseInt(document.getElementById('ft-p').value)||0));
  if(!name||!startDate)return;
  const{p}=findProj(FC.pid);if(!p)return;
  if(!p.tasks)p.tasks=[];
  if(FC.tid){const t=p.tasks.find(x=>x.id===FC.tid);if(t){t.name=name;t.startDate=startDate;t.duration=duration;t.progress=progress;}}
  else p.tasks.push({id:uid(),name,startDate,duration,progress});
  sv();closeF();render();
}
function delTsk(pid,tid){
  if(!confirm('¿Eliminar esta tarea?'))return;
  const{p}=findProj(pid);if(!p)return;
  p.tasks=p.tasks.filter(t=>t.id!==tid);
  sv();closeF();render();
}

// Sync scroll
setTimeout(()=>{
  let lk=false;
  const lp=document.getElementById('lp'),rp=document.getElementById('rp');
  rp.addEventListener('scroll',()=>{if(lk)return;lk=true;lp.scrollTop=rp.scrollTop;lk=false;});
  lp.addEventListener('scroll',()=>{if(lk)return;lk=true;rp.scrollTop=lp.scrollTop;lk=false;});
},250);

ld();render();
</script>
</body>
</html>
